<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Analyze Fit — California Government Contracts Center</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0F2A6A;--bg:#07132f;--surface:#0c2257;--panel:#102d70;--text:#f5f8ff;--muted:#9db0d4;--line:rgba(255,255,255,.12);--green:#6ee7a8;--cyan:#5bd3ff;--amber:#f5c36b;--red:#f87171;--gold:#c9a84c;--disp:'Bodoni Moda',Georgia,serif;--body:'Jost',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:linear-gradient(160deg,#0c2257,#070e1e 65%,#040914);color:var(--text);font-family:var(--body);line-height:1.6}.top{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:14px;padding:13px 22px;background:rgba(7,19,47,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}.brand{display:flex;align-items:center;gap:11px}.mark{width:39px;height:39px;border-radius:9px;display:grid;place-items:center;background:#fff;color:var(--ink);font-weight:800}.brand-name{font-family:var(--disp);font-size:1.05rem}.brand-sub{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border-radius:8px;padding:8px 15px;font:700 .72rem var(--body);letter-spacing:.06em;text-decoration:none;cursor:pointer}.btn-back{background:var(--cyan);color:var(--ink)}.btn-print{background:rgba(255,255,255,.08);border:1px solid var(--line);color:#fff}.page{max-width:920px;margin:0 auto;padding:30px 18px 80px}.loading{text-align:center;padding:85px 20px}.spinner{width:48px;height:48px;border:3px solid rgba(255,255,255,.12);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px}@keyframes spin{to{transform:rotate(360deg)}}.loading h1{font-family:var(--disp);font-weight:400;font-size:1.6rem}.loading p{color:var(--muted);font-size:.86rem;margin-top:8px}.hero{display:flex;gap:25px;align-items:center;flex-wrap:wrap;background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:16px;padding:26px 28px;margin-bottom:16px}.score{width:98px;height:98px;border:3px solid var(--cyan);border-radius:50%;display:grid;place-items:center;flex-shrink:0;background:rgba(91,211,255,.07)}.score strong{display:block;font-size:1.9rem;line-height:1}.score span{display:block;font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);text-align:center}.hero-copy{flex:1;min-width:230px}.eyebrow{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);font-weight:700}.hero h1{font-family:var(--disp);font-size:clamp(1.35rem,3vw,2rem);font-weight:400;line-height:1.25;margin:5px 0}.agency{color:var(--muted);font-size:.84rem}.badge{display:inline-block;margin-top:10px;padding:5px 13px;border-radius:999px;font-size:.67rem;font-weight:800;letter-spacing:.1em}.go{color:var(--green);border:1px solid rgba(110,231,168,.35);background:rgba(110,231,168,.1)}.review{color:var(--amber);border:1px solid rgba(245,195,107,.35);background:rgba(245,195,107,.1)}.no-go{color:var(--red);border:1px solid rgba(248,113,113,.35);background:rgba(248,113,113,.1)}.section{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:12px;padding:21px 24px;margin-bottom:13px}.section-title{display:flex;align-items:center;gap:9px;font-size:.68rem;text-transform:uppercase;letter-spacing:.13em;color:var(--cyan);font-weight:800;margin-bottom:12px}.num{width:23px;height:23px;border-radius:50%;display:grid;place-items:center;background:rgba(91,211,255,.12);border:1px solid rgba(91,211,255,.25);font-size:.62rem}.body{font-size:.88rem;color:rgba(255,255,255,.82)}.meta{width:100%;border-collapse:collapse}.meta td{padding:5px 0;vertical-align:top}.meta td:first-child{width:35%;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}ul{list-style:none;display:grid;gap:8px}li{padding-left:20px;position:relative}li:before{content:'✓';position:absolute;left:0;color:var(--green);font-weight:800}.risk li:before{content:'⚠';color:var(--amber)}.req li:before{content:'☐';color:var(--cyan)}.error{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:12px;padding:22px;color:#ffd6d6}.provider{margin-top:18px;text-align:center;color:rgba(255,255,255,.35);font-size:.67rem}.next{font-weight:600;color:#fff}.disclaimer{margin-top:16px;color:rgba(255,255,255,.38);font-size:.68rem;text-align:center}@media(max-width:600px){.top{padding:10px 12px}.brand-sub{display:none}.page{padding:18px 11px 60px}.hero,.section{padding:19px}.score{width:82px;height:82px}.meta td:first-child{width:42%}}@media print{body{background:#fff;color:#111}.top{position:static;background:#fff;border-bottom:1px solid #ccc}.btn{display:none}.brand-name,.hero h1{color:#111}.brand-sub,.agency,.body,.meta td{color:#333}.hero,.section{background:#fff;border:1px solid #ccc;break-inside:avoid}.provider,.disclaimer{color:#555}}
</style>
</head>
<body>
<header class="top"><div class="brand"><div class="mark">CA</div><div><div class="brand-name">California Government Contracts Center</div><div class="brand-sub">Contract Fit Intelligence</div></div></div><div class="actions"><a class="btn btn-back" href="/dashboard.html">← Back to Bid Board</a><button class="btn btn-print" onclick="window.print()">Print Report</button></div></header>
<main class="page"><div id="loading" class="loading"><div class="spinner"></div><h1>Analyzing opportunity fit…</h1><p>Reviewing capability alignment, eligibility, risks, requirements, and pursuit readiness.</p></div><div id="report" hidden></div></main>
<script>
'use strict';
const API='/.netlify/functions';
const payload=JSON.parse(sessionStorage.getItem('ca_analyze_payload')||'null');
const loading=document.getElementById('loading');
const report=document.getElementById('report');
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const list=(items,cls='')=>items&&items.length?'<ul class="'+cls+'">'+items.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>':'<p>Not enough information is available. Verify the solicitation documents.</p>';
const section=(n,title,html)=>'<section class="section"><div class="section-title"><span class="num">'+n+'</span>'+esc(title)+'</div><div class="body">'+html+'</div></section>';
function fail(message){loading.hidden=true;report.hidden=false;report.innerHTML='<div class="error"><strong>Analysis could not be completed.</strong><br>'+esc(message)+'</div>';}
function render(data){const bid=payload.bid||{},a=data.analysis||{};const rec=String(a.recommendation||'REVIEW').toUpperCase();const cls=rec==='GO'?'go':rec==='NO-GO'?'no-go':'review';let html='<section class="hero"><div class="score"><div><strong>'+esc(a.score)+'%</strong><span>Fit Score</span></div></div><div class="hero-copy"><div class="eyebrow">California Contract Fit Report</div><h1>'+esc(bid.title||'Opportunity Analysis')+'</h1><div class="agency">'+esc(bid.agency||'California Public Agency')+'</div><span class="badge '+cls+'">'+esc(rec)+'</span></div></section>';
html+=section(1,'Opportunity Summary','<table class="meta"><tr><td>Agency</td><td>'+esc(bid.agency||'—')+'</td></tr><tr><td>Solicitation</td><td>'+esc(bid.solicitation_no||bid.id||'—')+'</td></tr><tr><td>Type</td><td>'+esc(bid.bid_type||'Solicitation')+'</td></tr><tr><td>Deadline</td><td>'+esc(bid.close_date||bid.deadline||'See solicitation')+'</td></tr></table><p style="margin-top:12px">'+esc(bid.description||'Open the official solicitation documents to confirm the complete scope of work.')+'</p>');
html+=section(2,'Executive Fit Assessment','<p>'+esc(a.summary||'Additional review is required before making a bid decision.')+'</p>');
html+=section(3,'Capability Strengths',list(a.strengths));
html+=section(4,'Eligibility and Pursuit Risks',list(a.risks,'risk'));
html+=section(5,'Key Solicitation Requirements',list(a.requirements,'req'));
html+=section(6,'California Compliance Review','<p>Confirm all applicable SB/MB or DVBE conditions, licensing, prevailing-wage obligations, bonding, insurance, CARB or CalRecycle requirements, mandatory meetings, and geographic performance restrictions directly in the solicitation.</p>');
html+=section(7,'Bid / No-Bid Recommendation','<p><strong>'+esc(rec)+'</strong> — '+esc(a.summary||'Review required.')+'</p>');
html+=section(8,'Recommended Next Step','<p class="next">'+esc(a.next_steps||'Review the full solicitation and verify every mandatory requirement before committing proposal resources.')+'</p>');
html+='<div class="provider">Analysis provider: '+esc(data.provider||'configured AI service')+'</div><div class="disclaimer">Educational procurement intelligence only. Verify all requirements against the official solicitation and agency instructions.</div>';
loading.hidden=true;report.hidden=false;report.innerHTML=html;}
if(!payload||!payload.bid){fail('No California opportunity was supplied. Return to the bid board and select Analyze Fit again.');}else{fetch(API+'/analyze-fit-ca',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(async r=>{const d=await r.json().catch(()=>({}));if(!r.ok||!d.ok)throw new Error(d.error||'The analysis service returned '+r.status+'.'+(d.diagnostic?' '+d.diagnostic:''));return d;}).then(render).catch(e=>fail(e.message));}
</script>
</body>
</html>
