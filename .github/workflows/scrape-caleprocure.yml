name: Acquire Cal eProcure

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/scrape-caleprocure.yml'
      - 'scripts/scrape-caleprocure.js'
      - 'scripts/sync-supabase.js'
      - 'scripts/sync-supabase-grouped.js'
      - 'scripts/lib/caleprocure-normalize.js'
      - 'scripts/prepare-caleprocure-snapshot.js'
  schedule:
    - cron: '17 */4 * * *' # every four hours, offset from the top of the hour
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: acquire-caleprocure
  cancel-in-progress: true

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Prepare checked-in verified snapshot
        run: node scripts/prepare-caleprocure-snapshot.js
      - name: Immediately synchronize verified snapshot into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PDAS_SOURCE_JOB_ID: CA-CALEPROCURE
        run: node scripts/sync-supabase-grouped.js
      - run: npx playwright install --with-deps chromium
      - name: Acquire statewide Posted events and event packages
        run: node scripts/scrape-caleprocure.js --detail-limit=80 --package-limit=25 --refresh-hours=24
      - name: Commit refreshed Cal eProcure source snapshot
        run: |
          git config user.name "pdas-acquisition-bot"
          git config user.email "bot@aproposgroupllc.com"
          git add caleprocure.json
          git commit -m "data: refresh Cal eProcure acquisition snapshot" || echo "no changes to commit"
          git push
      - name: Synchronize refreshed verified records into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PDAS_SOURCE_JOB_ID: CA-CALEPROCURE
        run: node scripts/sync-supabase-grouped.js
