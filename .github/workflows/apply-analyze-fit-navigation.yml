name: Apply Analyze Fit Navigation
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-analyze-fit-navigation.yml'
permissions:
  contents: write
jobs:
  patch-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace drawer analysis with dedicated report navigation
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          path = Path('dashboard.html')
          text = path.read_text(encoding='utf-8')
          replacement = r'''function analyzeCaFit() {
            if (!_caBid) return;
            var selectedBid = Object.assign({}, _caBid, {
              description: _caDetail && _caDetail.description || _caBid.description || null
            });
            sessionStorage.setItem('ca_analyze_payload', JSON.stringify({
              bid: selectedBid,
              profile: PROFILE || {}
            }));
            closeCaDrawer();
            window.open('/analyze-fit.html', '_blank', 'noopener');
          }

          function openCaProposal'''
          pattern = r'function analyzeCaFit\(\) \{[\s\S]*?\n\}\n\nfunction openCaProposal'
          updated, count = re.subn(pattern, replacement, text, count=1)
          if count != 1:
              raise SystemExit('Expected Analyze Fit function block was not found exactly once.')
          path.write_text(updated, encoding='utf-8')
          PY
          rm .github/workflows/apply-analyze-fit-navigation.yml
      - name: Commit navigation correction
        run: |
          git config user.name "Aproposchpt2"
          git config user.email "actions@users.noreply.github.com"
          git add dashboard.html .github/workflows/apply-analyze-fit-navigation.yml
          git commit -m "Open California Analyze Fit in dedicated report page [skip ci]"
          git push