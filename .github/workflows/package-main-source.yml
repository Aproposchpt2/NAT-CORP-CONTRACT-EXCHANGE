name: Package merged source
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/package-main-source.yml'
permissions:
  contents: read
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove repository metadata
        run: rm -rf .git
      - uses: actions/upload-artifact@v4
        with:
          name: natcorp-main-source
          path: .
          include-hidden-files: true
          retention-days: 1
