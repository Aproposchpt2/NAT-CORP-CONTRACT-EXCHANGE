name: Ingest OBAS bulletin

on:
  schedule:
    - cron: '0 13 3 * *'   # ~6am Pacific, 3rd of each month (buffer for DGS posting delay)
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run ingest-obas
      - name: Commit refreshed obas.json
        run: |
          git config user.name "calstategen-bot"
          git config user.email "bot@aproposgroupllc.com"
          git add obas.json
          git commit -m "data: refresh OBAS bulletin" || echo "no changes to commit"
          git push
