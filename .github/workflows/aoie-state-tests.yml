name: AOIE State Local Tests

on:
  push:
    branches:
      - agent/aoie-state-local-shadow
      - fix/dashboard-controls-premium-analyze-fit
      - agent/var-session-revocation
    paths:
      - 'netlify/functions/_shared/aoie-state-*.mjs'
      - 'netlify/functions/aoie-state-shadow.mjs'
      - 'netlify/functions/analyze-fit-state.mjs'
      - 'tests/aoie-state-*.test.mjs'
      - 'tests/analyze-fit-premium.test.mjs'
      - 'welcome.html'
      - 'business-dna-builder-preview.html'
      - 'aois-dashboard-preview.html'
      - 'analyze-fit-v2.html'
      - 'netlify.toml'
      - '.github/workflows/aoie-state-tests.yml'
  pull_request:
    paths:
      - 'netlify/functions/_shared/aoie-state-*.mjs'
      - 'netlify/functions/aoie-state-shadow.mjs'
      - 'netlify/functions/analyze-fit-state.mjs'
      - 'tests/aoie-state-*.test.mjs'
      - 'tests/analyze-fit-premium.test.mjs'
      - 'welcome.html'
      - 'business-dna-builder-preview.html'
      - 'aois-dashboard-preview.html'
      - 'analyze-fit-v2.html'
      - 'netlify.toml'
      - '.github/workflows/aoie-state-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run state/local AOIE matcher fixtures
        run: node tests/aoie-state-local.test.mjs
      - name: Run state/local AOIE source-contract fixtures
        run: node tests/aoie-state-source.test.mjs
      - name: Validate AOIE function syntax
        run: node --check netlify/functions/aoie-state-shadow.mjs
      - name: Validate Analyze Fit function syntax
        run: node --check netlify/functions/analyze-fit-state.mjs
      - name: Run fresh-visit dashboard and report regressions
        run: node tests/analyze-fit-premium.test.mjs
