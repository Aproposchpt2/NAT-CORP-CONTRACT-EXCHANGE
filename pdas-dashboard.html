<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PDAS Acquisition Mission Control</title>
<style>
:root{--bg:#07142f;--panel:#10244d;--panel2:#0b1d40;--line:rgba(255,255,255,.12);--text:#f7f9ff;--muted:#91a2c6;--cyan:#67d7ff;--green:#6ee7a8;--amber:#f4c76d;--red:#ff7b85;--gold:#d7b55b}*{box-sizing:border-box}body{margin:0;background:linear-gradient(145deg,#091b42,#050c1d 72%);color:var(--text);font:14px/1.45 Inter,Arial,sans-serif;min-height:100vh}.top{display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:1px solid var(--line);background:rgba(5,12,29,.86);position:sticky;top:0;z-index:5;backdrop-filter:blur(12px)}.brand{display:flex;gap:12px;align-items:center}.mark{width:42px;height:42px;border-radius:10px;background:white;color:#10244d;display:grid;place-items:center;font-weight:900}.brand h1{font:600 20px Georgia,serif;margin:0}.brand small,.muted{color:var(--muted)}.refresh{background:var(--cyan);color:#07142f;border:0;border-radius:8px;padding:10px 15px;font-weight:800;cursor:pointer}.shell{max-width:1420px;margin:auto;padding:26px}.statusline{display:flex;justify-content:space-between;gap:15px;flex-wrap:wrap;margin-bottom:16px;color:var(--muted);font-size:12px}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}.card,.panel{background:rgba(16,36,77,.75);border:1px solid var(--line);border-radius:14px}.card{padding:18px}.value{font:500 30px Georgia,serif}.label{text-transform:uppercase;letter-spacing:.11em;color:var(--muted);font-size:10px;margin-top:7px}.grid{display:grid;grid-template-columns:1.05fr 1fr 1.25fr;gap:14px;margin-top:14px}.panel{padding:18px;min-width:0}.panel h2{font:500 18px Georgia,serif;margin:0 0 14px}.row{display:grid;grid-template-columns:minmax(115px,1fr) 3fr 50px;align-items:center;gap:10px;margin:9px 0}.bar{height:9px;background:rgba(255,255,255,.08);border-radius:20px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:20px}.num{text-align:right;font-weight:800}.tablewrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:12px}th,td{text-align:left;padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.08);vertical-align:top}th{color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:9px}.badge{display:inline-block;border-radius:999px;padding:4px 8px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}.ok{background:rgba(110,231,168,.12);color:var(--green)}.bad{background:rgba(255,123,133,.12);color:var(--red)}.warn{background:rgba(244,199,109,.12);color:var(--amber)}.wide{grid-column:span 2}.error{padding:25px;background:rgba(255,123,133,.1);border:1px solid rgba(255,123,133,.35);border-radius:12px;color:#ffd9dc}.loading{padding:80px;text-align:center;color:var(--muted)}@media(max-width:1100px){.cards{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:1fr 1fr}.wide{grid-column:span 2}}@media(max-width:680px){.shell{padding:14px}.top{padding:14px}.cards,.grid{grid-template-columns:1fr}.wide{grid-column:auto}.brand small{display:none}}
</style>
</head>
<body>
<header class="top"><div class="brand"><div class="mark">PD</div><div><h1>PDAS Acquisition Mission Control</h1><small>APROPOS Procurement Data Acquisition System</small></div></div><button class="refresh" onclick="loadData()">Refresh Live Data</button></header>
<main class="shell"><div id="app" class="loading">Loading live PDAS metrics…</div></main>
<script>
const api='/.netlify/functions/pdas-dashboard';
const esc=s=>String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const n=v=>Number(v||0).toLocaleString();
const dt=v=>v?new Date(v).toLocaleString():'—';
const cls=s=>{s=String(s||'').toLowerCase();return ['success','succeeded','idle','scheduled'].includes(s)?'ok':s==='failed'?'bad':'warn'};
function bars(title,rows){const max=Math.max(1,...rows.map(x=>x.count));return `<section class="panel"><h2>${esc(title)}</h2>${rows.length?rows.map(x=>`<div class="row"><span>${esc(x.name)}</span><div class="bar"><div class="fill" style="width:${Math.max(2,x.count/max*100)}%"></div></div><span class="num">${n(x.count)}</span></div>`).join(''):'<div class="muted">No data</div>'}</section>`}
function render(d){const s=d.summary||{},jobs=d.jobs||[],runs=d.recent_runs||[];document.getElementById('app').className='';document.getElementById('app').innerHTML=`
<div class="statusline"><span>Authoritative table: <strong>${esc(d.tables.opportunities)}</strong></span><span>Last refreshed: ${dt(d.generated_at)}</span></div>
<div class="cards">
<div class="card"><div class="value">${n(s.total_opportunities)}</div><div class="label">Total Opportunities</div></div>
<div class="card"><div class="value">${n(s.current_opportunities)}</div><div class="label">Current Opportunities</div></div>
<div class="card"><div class="value">${n(s.added_last_24h)}</div><div class="label">Added Last 24 Hours</div></div>
<div class="card"><div class="value">${n(s.publisher_count)}</div><div class="label">Registered Publishers</div></div>
<div class="card"><div class="value">${n(s.active_job_count)}</div><div class="label">Active Connectors</div></div>
<div class="card"><div class="value">${n(s.failed_job_count)}</div><div class="label">Failed Connectors</div></div>
</div>
<div class="grid">
${bars('Opportunities by State',d.states||[])}
${bars('Opportunities by Status',d.statuses||[])}
${bars('Source Platform Distribution',d.sources||[])}
${bars('Top Issuing Organizations',d.organizations||[])}
<section class="panel wide"><h2>Acquisition Connector Health</h2><div class="tablewrap"><table><thead><tr><th>Job</th><th>Source</th><th>Status</th><th>Last Success</th><th>Inserted</th><th>Failures</th><th>Next Run</th></tr></thead><tbody>${jobs.map(j=>`<tr><td><strong>${esc(j.job_name||j.job_id)}</strong><br><span class="muted">${esc(j.job_id)}</span></td><td>${esc(j.source_platform||'—')}</td><td><span class="badge ${cls(j.job_status)}">${esc(j.job_status||'unknown')}</span></td><td>${dt(j.last_success_at)}</td><td>${n(j.last_records_inserted)}</td><td>${n(j.consecutive_failures)}</td><td>${dt(j.next_scheduled_at)}</td></tr>`).join('')||'<tr><td colspan="7">No acquisition jobs registered.</td></tr>'}</tbody></table></div></section>
<section class="panel wide"><h2>Recent Acquisition Runs</h2><div class="tablewrap"><table><thead><tr><th>Run</th><th>Job</th><th>Status</th><th>Started</th><th>Discovered</th><th>Inserted</th><th>Updated</th><th>Failed</th></tr></thead><tbody>${runs.map(r=>`<tr><td>${esc(r.ingestion_run_id||r.run_id)}</td><td>${esc(r.job_id)}</td><td><span class="badge ${cls(r.run_status)}">${esc(r.run_status)}</span></td><td>${dt(r.started_at)}</td><td>${n(r.records_discovered)}</td><td>${n(r.records_inserted)}</td><td>${n(r.records_updated)}</td><td>${n(r.records_failed)}</td></tr>`).join('')||'<tr><td colspan="8">No acquisition runs recorded.</td></tr>'}</tbody></table></div></section>
</div>`}
async function loadData(){document.getElementById('app').className='loading';document.getElementById('app').textContent='Loading live PDAS metrics…';try{const r=await fetch(api,{cache:'no-store'}),d=await r.json();if(!r.ok||!d.ok)throw new Error(d.error||`HTTP ${r.status}`);render(d)}catch(e){document.getElementById('app').className='error';document.getElementById('app').innerHTML='<strong>Dashboard unavailable.</strong><br>'+esc(e.message)}}
loadData();
</script>
</body></html>
