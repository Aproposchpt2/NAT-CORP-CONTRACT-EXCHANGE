<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>National Corporation Contract Exchange — Preparing Dashboard</title>
<meta name="robots" content="noindex"/>
<style>
:root{--ink:#0F2A6A;--deep:#060d22;--white:#fff;--gold:#D5AE55;--muted:#9DB0D4;--line:rgba(255,255,255,.14);--red:#F87171}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(160deg,var(--ink),var(--deep));font-family:Arial,sans-serif;color:var(--white)}
.card{width:min(520px,100%);padding:38px;border:1px solid var(--line);background:rgba(255,255,255,.05);text-align:center}.mark{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}h1{font-family:Georgia,serif;font-weight:400;font-size:2rem;margin-bottom:12px}.sub{color:var(--muted);line-height:1.7}.spin{width:44px;height:44px;margin:20px auto;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.err{color:var(--red);margin-top:14px}
</style>
</head>
<body>
<div class="card">
  <div class="mark">National Corporation Contract Exchange</div>
  <h1 id="heading">Preparing your contract dashboard</h1>
  <svg class="spin" viewBox="0 0 52 52"><circle cx="26" cy="26" r="22" fill="none" stroke="rgba(213,174,85,.2)" stroke-width="4"/><circle cx="26" cy="26" r="22" fill="none" stroke="#D5AE55" stroke-width="4" stroke-linecap="round" stroke-dasharray="138" stroke-dashoffset="100" transform="rotate(-90 26 26)"/></svg>
  <p class="sub" id="sub">Saving your licensed-corporation profile and matching your services to open state and local opportunities.</p>
  <div class="err" id="err"></div>
</div>
<script>
(function(){
  'use strict';
  var q=new URLSearchParams(location.search);
  var name=(q.get('name')||q.get('prefill_name')||'').trim();
  var business=(q.get('business')||q.get('prefill_business')||'').trim();
  var email=(q.get('email')||q.get('prefill_email')||'').trim().toLowerCase();
  var rawServices=(q.get('services')||q.get('keywords')||'').trim();
  var source=(q.get('source')||'ngcc').trim();
  var keywords=rawServices.split(/[|,;\n]+/).map(function(v){return v.trim().toLowerCase();}).filter(Boolean);
  var profile={name:name,business_name:business,email:email,state:'US',keywords:keywords,services:keywords,source:source,updated_at:new Date().toISOString()};
  var session={token:'natcorp-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2),name:name,business_name:business,email:email,state:'US',keywords:keywords,source:source,signed_in_at:new Date().toISOString()};
  if(name) document.getElementById('heading').textContent='Welcome, '+name.split(/\s+/)[0];
  if(business) document.getElementById('sub').textContent='Preparing '+business+'’s state and local opportunity dashboard.';
  try{
    localStorage.setItem('calgcc_profile',JSON.stringify(profile));
    localStorage.setItem('calgcc_session',JSON.stringify(session));
    localStorage.setItem('natcorp_profile',JSON.stringify(profile));
    localStorage.setItem('natcorp_session',JSON.stringify(session));
    sessionStorage.setItem('natcorp_handoff',JSON.stringify({source:source,received_at:new Date().toISOString()}));
    setTimeout(function(){location.replace(keywords.length?'/dashboard.html':'/services.html');},650);
  }catch(e){document.getElementById('err').textContent='Your browser blocked local profile storage. Enable site storage and try again.';}
})();
</script>
</body>
</html>
