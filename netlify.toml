[build]
  publish = "."
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/stage"
  to = "/stage.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[edge_functions]]
  path = "/"
  function = "calstategen-nav-login-cta"

[[edge_functions]]
  path = "/index.html"
  function = "calstategen-nav-login-cta"

[[edge_functions]]
  path = "/dashboard.html"
  function = "natcorp-conversion"

[[edge_functions]]
  path = "/services.html"
  function = "natcorp-conversion"

[[edge_functions]]
  path = "/intake.html"
  function = "natcorp-conversion"

[[edge_functions]]
  path = "/login.html"
  function = "natcorp-conversion"

[[edge_functions]]
  path = "/welcome.html"
  function = "natcorp-conversion"

[[edge_functions]]
  path = "/stage.html"
  function = "natcorp-conversion"
